<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif; }
    </style>
    <!-- Drop shadow filter -->
    <filter id="shadow-sm" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="shadow-md" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <!-- Gradients -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c8a84b"/>
      <stop offset="50%" stop-color="#f0d080"/>
      <stop offset="100%" stop-color="#c8a84b"/>
    </linearGradient>
    <linearGradient id="comment-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e07b54" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e07b54" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="sidebar-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#242528"/>
      <stop offset="100%" stop-color="#1e1f22"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1d20"/>
      <stop offset="100%" stop-color="#17181b"/>
    </linearGradient>
    <linearGradient id="accent-bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e07b54"/>
      <stop offset="100%" stop-color="#b85a2e"/>
    </linearGradient>
    <!-- Blur for glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="1280" height="800" fill="url(#bg-grad)"/>

  <!-- ── SIDEBAR (260px) ── -->
  <rect x="0" y="0" width="260" height="800" fill="url(#sidebar-grad)"/>
  <rect x="259" y="0" width="1" height="800" fill="#2e2f34"/>

  <!-- Sidebar top logo area -->
  <rect x="0" y="0" width="260" height="60" fill="#242528"/>
  <rect x="0" y="59" width="260" height="1" fill="#2e2f34"/>

  <!-- Logo -->
  <rect x="16" y="16" width="30" height="30" rx="8" fill="#e07b54" fill-opacity="0.18"/>
  <rect x="21" y="21" width="20" height="20" rx="5" fill="#e07b54" fill-opacity="0.3"/>
  <text x="26" y="37" font-size="14" font-weight="800" fill="#e07b54">α</text>
  <text x="56" y="33" font-size="13" font-weight="700" fill="#e9e9e7" letter-spacing="0.3">Bíblia Alpha</text>
  <text x="56" y="48" font-size="10" fill="#5a5a57" letter-spacing="0.5">PLATAFORMA DE ESTUDOS</text>

  <!-- Search -->
  <rect x="14" y="74" width="232" height="34" rx="8" fill="#2a2b2e" stroke="#35363c" stroke-width="1"/>
  <text x="34" y="96" font-size="11" fill="#5a5a57">🔍</text>
  <text x="52" y="96" font-size="12" fill="#4a4a47">Buscar livro ou capítulo...</text>

  <!-- Section label AT -->
  <text x="18" y="132" font-size="9" font-weight="700" fill="#4a4a47" letter-spacing="1.5">ANTIGO TESTAMENTO</text>

  <!-- Book list -->
  <!-- Active: Gênesis -->
  <rect x="10" y="140" width="240" height="30" rx="7" fill="#e07b54" fill-opacity="0.14"/>
  <rect x="10" y="140" width="3" height="30" rx="2" fill="url(#accent-bar)"/>
  <text x="24" y="160" font-size="13" font-weight="600" fill="#e9e9e7">Gênesis</text>
  <rect x="220" y="148" width="28" height="14" rx="4" fill="#e07b54" fill-opacity="0.25"/>
  <text x="234" y="159" font-size="9" font-weight="700" fill="#e07b54" text-anchor="middle">50</text>

  <!-- Others -->
  <rect x="10" y="174" width="240" height="28" rx="6" fill="transparent"/>
  <text x="22" y="193" font-size="13" fill="#6a6a67">Êxodo</text>
  <text x="226" y="193" font-size="11" fill="#4a4a47">40</text>

  <rect x="10" y="205" width="240" height="28" rx="6" fill="transparent"/>
  <text x="22" y="224" font-size="13" fill="#6a6a67">Levítico</text>
  <text x="226" y="224" font-size="11" fill="#4a4a47">27</text>

  <rect x="10" y="235" width="240" height="28" rx="6" fill="transparent"/>
  <text x="22" y="254" font-size="13" fill="#6a6a67">Números</text>
  <text x="226" y="254" font-size="11" fill="#4a4a47">36</text>

  <rect x="10" y="265" width="240" height="28" rx="6" fill="transparent"/>
  <text x="22" y="284" font-size="13" fill="#6a6a67">Deuteronômio</text>
  <text x="226" y="284" font-size="11" fill="#4a4a47">34</text>

  <rect x="10" y="295" width="240" height="28" rx="6" fill="transparent"/>
  <text x="22" y="314" font-size="13" fill="#5a5a57">Josué</text>
  <rect x="10" y="323" width="240" height="28" rx="6" fill="transparent"/>
  <text x="22" y="342" font-size="13" fill="#5a5a57">Juízes</text>
  <rect x="10" y="351" width="240" height="28" rx="6" fill="transparent"/>
  <text x="22" y="370" font-size="13" fill="#5a5a57">Rute</text>
  <rect x="10" y="379" width="240" height="28" rx="6" fill="transparent"/>
  <text x="22" y="398" font-size="13" fill="#5a5a57">1 Samuel</text>
  <rect x="10" y="407" width="240" height="28" rx="6" fill="transparent"/>
  <text x="22" y="426" font-size="13" fill="#5a5a57">2 Samuel</text>

  <!-- NT section -->
  <text x="18" y="456" font-size="9" font-weight="700" fill="#4a4a47" letter-spacing="1.5">NOVO TESTAMENTO</text>
  <rect x="10" y="463" width="240" height="28" rx="6" fill="transparent"/>
  <text x="22" y="482" font-size="13" fill="#5a5a57">Mateus</text>
  <rect x="10" y="491" width="240" height="28" rx="6" fill="transparent"/>
  <text x="22" y="510" font-size="13" fill="#5a5a57">Marcos</text>
  <rect x="10" y="519" width="240" height="28" rx="6" fill="transparent"/>
  <text x="22" y="538" font-size="13" fill="#5a5a57">Lucas</text>
  <rect x="10" y="547" width="240" height="28" rx="6" fill="transparent"/>
  <text x="22" y="566" font-size="13" fill="#5a5a57">João</text>

  <!-- Sidebar bottom actions -->
  <rect x="0" y="725" width="260" height="1" fill="#2e2f34"/>
  <rect x="10" y="734" width="240" height="32" rx="7" fill="#2a2b2e" stroke="#35363c" stroke-width="1"/>
  <text x="26" y="754" font-size="12" fill="#7a7a77">📚</text>
  <text x="46" y="754" font-size="12" font-weight="600" fill="#9a9a97">Biblioteca de Ebooks</text>
  <text x="236" y="754" font-size="10" fill="#e07b54">→</text>

  <!-- ── TOPBAR (main) ── -->
  <rect x="260" y="0" width="1020" height="56" fill="#222326"/>
  <rect x="260" y="55" width="1020" height="1" fill="#2e2f34"/>

  <!-- Breadcrumb -->
  <text x="282" y="32" font-size="13" fill="#5a5a57">Bíblia</text>
  <text x="318" y="32" font-size="13" fill="#3a3a37"> / </text>
  <text x="334" y="32" font-size="13" fill="#7a7a77">Gênesis</text>
  <text x="396" y="32" font-size="13" fill="#3a3a37"> / </text>
  <text x="412" y="32" font-size="13" font-weight="600" fill="#e9e9e7">Capítulo 1</text>

  <!-- Translation badge -->
  <rect x="980" y="14" width="76" height="28" rx="7" fill="#2a2b2e" stroke="#35363c" stroke-width="1"/>
  <text x="993" y="33" font-size="12" font-weight="600" fill="#c0c0bd">ARC  ▾</text>

  <!-- Nav arrows -->
  <rect x="1064" y="14" width="30" height="28" rx="7" fill="#2a2b2e" stroke="#35363c" stroke-width="1"/>
  <text x="1073" y="33" font-size="15" fill="#6a6a67">‹</text>
  <rect x="1100" y="14" width="30" height="28" rx="7" fill="#2a2b2e" stroke="#35363c" stroke-width="1"/>
  <text x="1109" y="33" font-size="15" fill="#6a6a67">›</text>

  <!-- Bookmark icon -->
  <rect x="1140" y="14" width="30" height="28" rx="7" fill="#2a2b2e" stroke="#35363c" stroke-width="1"/>
  <text x="1149" y="33" font-size="14" fill="#c8a84b">🔖</text>

  <!-- Font size control -->
  <rect x="1176" y="14" width="52" height="28" rx="7" fill="#2a2b2e" stroke="#35363c" stroke-width="1"/>
  <text x="1191" y="33" font-size="12" fill="#6a6a67">Aa</text>

  <!-- ── MAIN CONTENT AREA ── -->
  <rect x="260" y="56" width="790" height="744" fill="#1c1d20"/>

  <!-- Chapter heading -->
  <text x="310" y="116" font-size="32" font-weight="800" fill="#e9e9e7">Gênesis 1</text>
  <text x="310" y="143" font-size="14" fill="#6a6a67" letter-spacing="0.3">A Criação do Mundo</text>

  <!-- Gold divider line -->
  <rect x="310" y="158" width="60" height="2" rx="1" fill="url(#gold-grad)"/>
  <rect x="374" y="159" width="520" height="1" fill="#2a2b2e"/>

  <!-- Verse 1 -->
  <text x="310" y="197" font-size="11" font-weight="800" fill="#e07b54">1</text>
  <text x="332" y="197" font-size="16" fill="#deded9">No princípio criou Deus os céus e a terra.</text>

  <!-- Comment block 1 — Matthew Henry -->
  <rect x="332" y="210" width="596" height="82" rx="8" fill="url(#comment-grad)"/>
  <rect x="332" y="210" width="3" height="82" rx="2" fill="url(#accent-bar)"/>
  <text x="348" y="232" font-size="9" font-weight="800" fill="#e07b54" letter-spacing="1.5">MATTHEW HENRY</text>
  <text x="348" y="252" font-size="13" fill="#9a9a97">O primeiro verso da Escritura estabelece Deus como o criador soberano de toda a</text>
  <text x="348" y="270" font-size="13" fill="#9a9a97">existência. "No princípio" não descreve um tempo anterior a Deus, mas o próprio</text>
  <text x="348" y="288" font-size="13" fill="#9a9a97">início da criação — tudo existe por sua vontade e poder.</text>

  <!-- Verse 2 -->
  <text x="310" y="322" font-size="11" font-weight="800" fill="#e07b54">2</text>
  <text x="332" y="322" font-size="16" fill="#deded9">A terra era sem forma e vazia; e havia trevas sobre a face do abismo;</text>
  <text x="332" y="344" font-size="16" fill="#deded9">e o Espírito de Deus pairava sobre a face das águas.</text>

  <!-- Verse 3 highlighted row -->
  <rect x="302" y="362" width="738" height="40" rx="6" fill="#e07b54" fill-opacity="0.06"/>
  <text x="310" y="388" font-size="11" font-weight="800" fill="#e07b54">3</text>
  <text x="332" y="388" font-size="16" font-weight="600" fill="#e9e9e7">E disse Deus: Haja luz; e houve luz.</text>
  <!-- Small tag on highlighted verse -->
  <rect x="880" y="370" width="50" height="18" rx="4" fill="#e07b54" fill-opacity="0.2"/>
  <text x="905" y="383" font-size="9" font-weight="700" fill="#e07b54" text-anchor="middle">destaque</text>

  <!-- Comment block 2 — João Calvino -->
  <rect x="332" y="414" width="596" height="86" rx="8" fill="url(#comment-grad)"/>
  <rect x="332" y="414" width="3" height="86" rx="2" fill="url(#accent-bar)"/>
  <text x="348" y="436" font-size="9" font-weight="800" fill="#e07b54" letter-spacing="1.5">JOÃO CALVINO</text>
  <text x="348" y="456" font-size="13" fill="#9a9a97">A criação da luz pela palavra divina revela um ato de poder absoluto. Calvino</text>
  <text x="348" y="474" font-size="13" fill="#9a9a97">identifica aqui o Logos (Jo 1:3) como agente da criação, manifestando a Trindade</text>
  <text x="348" y="492" font-size="13" fill="#9a9a97">já no primeiro capítulo das Escrituras.</text>

  <!-- Verse 4 -->
  <text x="310" y="528" font-size="11" font-weight="800" fill="#e07b54">4</text>
  <text x="332" y="528" font-size="16" fill="#deded9">E viu Deus que a luz era boa; e fez Deus separação entre</text>
  <text x="332" y="550" font-size="16" fill="#deded9">a luz e as trevas.</text>

  <!-- Verse 5 -->
  <text x="310" y="584" font-size="11" font-weight="800" fill="#e07b54">5</text>
  <text x="332" y="584" font-size="16" fill="#deded9">E chamou Deus à luz Dia, e às trevas chamou Noite.</text>
  <text x="332" y="606" font-size="16" fill="#deded9">E foi a tarde e a manhã, o dia primeiro.</text>

  <!-- Progress bar -->
  <rect x="310" y="754" width="620" height="3" rx="2" fill="#2a2b2e"/>
  <rect x="310" y="754" width="62" height="3" rx="2" fill="url(#gold-grad)"/>
  <!-- Progress dot -->
  <circle cx="372" cy="755" r="5" fill="#c8a84b" filter="url(#glow)"/>
  <text x="938" y="758" font-size="11" fill="#5a5a57">10% concluído</text>

  <!-- ── RIGHT CONTEXT PANEL ── -->
  <rect x="1050" y="56" width="230" height="744" fill="#1e1f22"/>
  <rect x="1050" y="56" width="1" height="744" fill="#2e2f34"/>

  <!-- Panel header -->
  <rect x="1050" y="56" width="230" height="50" fill="#222326"/>
  <rect x="1050" y="106" width="230" height="1" fill="#2e2f34"/>
  <text x="1068" y="87" font-size="10" font-weight="700" fill="#7a7a77" letter-spacing="1.2">PAINEL DE CONTEXTO</text>

  <!-- Context section -->
  <text x="1068" y="130" font-size="10" font-weight="700" fill="#5a5a57" letter-spacing="1">CONTEXTO DO CAPÍTULO</text>
  <text x="1068" y="150" font-size="12" fill="#8a8a87">A narrativa da criação em</text>
  <text x="1068" y="168" font-size="12" fill="#8a8a87">Gênesis 1 apresenta Deus</text>
  <text x="1068" y="186" font-size="12" fill="#8a8a87">como criador soberano por</text>
  <text x="1068" y="204" font-size="12" fill="#8a8a87">meio de sua palavra poderosa.</text>

  <rect x="1068" y="218" width="190" height="1" fill="#2a2b2e"/>

  <!-- Cross references -->
  <text x="1068" y="242" font-size="10" font-weight="700" fill="#5a5a57" letter-spacing="1">REFERÊNCIAS CRUZADAS</text>
  <rect x="1068" y="252" width="140" height="24" rx="5" fill="#e07b54" fill-opacity="0.1" stroke="#e07b54" stroke-opacity="0.2" stroke-width="1"/>
  <text x="1082" y="269" font-size="12" fill="#e07b54">→ João 1:1-3</text>
  <rect x="1068" y="282" width="160" height="24" rx="5" fill="#e07b54" fill-opacity="0.1" stroke="#e07b54" stroke-opacity="0.2" stroke-width="1"/>
  <text x="1082" y="299" font-size="12" fill="#e07b54">→ Colossenses 1:16</text>
  <rect x="1068" y="312" width="130" height="24" rx="5" fill="#e07b54" fill-opacity="0.1" stroke="#e07b54" stroke-opacity="0.2" stroke-width="1"/>
  <text x="1082" y="329" font-size="12" fill="#e07b54">→ Salmos 33:6</text>
  <rect x="1068" y="342" width="130" height="24" rx="5" fill="#e07b54" fill-opacity="0.1" stroke="#e07b54" stroke-opacity="0.2" stroke-width="1"/>
  <text x="1082" y="359" font-size="12" fill="#e07b54">→ Hebreus 11:3</text>

  <rect x="1068" y="376" width="190" height="1" fill="#2a2b2e"/>

  <!-- Authors -->
  <text x="1068" y="400" font-size="10" font-weight="700" fill="#5a5a57" letter-spacing="1">COMENTARISTAS</text>
  <rect x="1068" y="410" width="168" height="26" rx="6" fill="#2a2b2e"/>
  <rect x="1068" y="410" width="3" height="26" rx="2" fill="#e07b54"/>
  <text x="1082" y="428" font-size="12" fill="#a0a09d">Matthew Henry</text>
  <rect x="1068" y="442" width="148" height="26" rx="6" fill="#2a2b2e"/>
  <rect x="1068" y="442" width="3" height="26" rx="2" fill="#c8a84b"/>
  <text x="1082" y="460" font-size="12" fill="#a0a09d">João Calvino</text>
  <rect x="1068" y="474" width="140" height="26" rx="6" fill="#2a2b2e"/>
  <rect x="1068" y="474" width="3" height="26" rx="2" fill="#6088d4"/>
  <text x="1082" y="492" font-size="12" fill="#a0a09d">Agostinho</text>

  <rect x="1068" y="510" width="190" height="1" fill="#2a2b2e"/>

  <!-- Notes section -->
  <text x="1068" y="534" font-size="10" font-weight="700" fill="#5a5a57" letter-spacing="1">MINHAS ANOTAÇÕES</text>
  <rect x="1068" y="544" width="190" height="60" rx="7" fill="#2a2b2e" stroke="#35363c" stroke-width="1"/>
  <text x="1082" y="568" font-size="12" fill="#4a4a47">Adicionar anotação...</text>

  <!-- Tags -->
  <text x="1068" y="626" font-size="10" font-weight="700" fill="#5a5a57" letter-spacing="1">TEMAS DESTE CAPÍTULO</text>
  <rect x="1068" y="636" width="64" height="20" rx="4" fill="#2a2b2e"/>
  <text x="1078" y="650" font-size="10" fill="#7a7a77">Criação</text>
  <rect x="1138" y="636" width="50" height="20" rx="4" fill="#2a2b2e"/>
  <text x="1148" y="650" font-size="10" fill="#7a7a77">Gênesis</text>
  <rect x="1068" y="662" width="80" height="20" rx="4" fill="#2a2b2e"/>
  <text x="1078" y="676" font-size="10" fill="#7a7a77">Trindade</text>
  <rect x="1154" y="662" width="60" height="20" rx="4" fill="#2a2b2e"/>
  <text x="1164" y="676" font-size="10" fill="#7a7a77">Luz</text>

