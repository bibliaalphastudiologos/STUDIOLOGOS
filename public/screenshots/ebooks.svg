      <stop offset="0%" stop-color="#3d1f0e"/><stop offset="100%" stop-color="#6b3520"/>
    </linearGradient>
    <linearGradient id="book2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1a3d"/><stop offset="100%" stop-color="#1a2e6b"/>
