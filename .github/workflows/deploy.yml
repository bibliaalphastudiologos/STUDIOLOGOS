name: Deploy Studio Logos

    on:
      push:
        branches:
          - main

    jobs:
      deploy:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@v4

          - name: Install lftp
            run: sudo apt-get install -y lftp

          - name: Deploy via lftp
            env:
              FTP_USER: ${{ secrets.FTP_USER }}
              FTP_PASS: ${{ secrets.FTP_PASS }}
            run: |
              lftp -u "$FTP_USER","$FTP_PASS" ftp://89.116.115.179 <<EOF
              set ftp:ssl-allow false
              set net:timeout 60
              mirror --reverse --delete --verbose --no-perms public/ /public_html/
              bye
              EOF
    