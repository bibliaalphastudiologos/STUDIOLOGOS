    </clipPath>
    <clipPath id="main-clip">
      <rect x="240" y="0" width="960" height="750"/>
    </clipPath>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e07b54;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0a882;stop-opacity:1" />
    </linearGradient>
