  <text x="52" y="29" font-size="13" font-weight="800" fill="#e9e9e7">Bíblia Alpha</text>
  <text x="52" y="44" font-size="10" fill="#7a7a77">de Estudos</text>
  
  <!-- Search bar -->
  <rect x="12" y="68" width="216" height="30" rx="6" fill="#32333a"/>
  <text x="26" y="87" font-size="11" fill="#7a7a77">🔍  Buscar livro...</text>
  
  <!-- Books section label -->
  <text x="16" y="120" font-size="10" font-weight="700" fill="#7a7a77" letter-spacing="0.08em">ANTIGO TESTAMENTO</text>
  
  <!-- Book items -->
  <rect x="8" y="128" width="224" height="28" rx="6" fill="#32333a"/>
  <rect x="16" y="134" width="3" height="16" rx="2" fill="#e07b54"/>
  <text x="28" y="147" font-size="13" font-weight="600" fill="#e9e9e7">Gênesis</text>
  <text x="206" y="147" font-size="11" fill="#7a7a77">50</text>
  
  <rect x="8" y="160" width="224" height="26" rx="5" fill="transparent"/>
  <text x="20" y="178" font-size="13" fill="#7a7a77">Êxodo</text>
  <text x="206" y="178" font-size="11" fill="#5a5a57">40</text>
  
  <rect x="8" y="190" width="224" height="26" rx="5" fill="transparent"/>
  <text x="20" y="208" font-size="13" fill="#7a7a77">Levítico</text>
  <text x="206" y="208" font-size="11" fill="#5a5a57">27</text>
  
  <rect x="8" y="220" width="224" height="26" rx="5" fill="transparent"/>
  <text x="20" y="238" font-size="13" fill="#7a7a77">Números</text>
  <text x="206" y="238" font-size="11" fill="#5a5a57">36</text>
  
  <rect x="8" y="250" width="224" height="26" rx="5" fill="transparent"/>
  <text x="20" y="268" font-size="13" fill="#7a7a77">Deuteronômio</text>
  <text x="206" y="268" font-size="11" fill="#5a5a57">34</text>
  
  <rect x="8" y="280" width="224" height="26" rx="5" fill="transparent"/>
  <text x="20" y="298" font-size="13" fill="#7a7a77">Josué</text>
  
  <rect x="8" y="310" width="224" height="26" rx="5" fill="transparent"/>
  <text x="20" y="328" font-size="13" fill="#7a7a77">Juízes</text>
  
  <rect x="8" y="340" width="224" height="26" rx="5" fill="transparent"/>
  <text x="20" y="358" font-size="13" fill="#7a7a77">Rute</text>
  
  <rect x="8" y="370" width="224" height="26" rx="5" fill="transparent"/>
  <text x="20" y="388" font-size="13" fill="#7a7a77">1 Samuel</text>
  
  <text x="16" y="424" font-size="10" font-weight="700" fill="#7a7a77" letter-spacing="0.08em">NOVO TESTAMENTO</text>
  
  <rect x="8" y="430" width="224" height="26" rx="5" fill="transparent"/>
  <text x="20" y="448" font-size="13" fill="#7a7a77">Mateus</text>
  
  <rect x="8" y="458" width="224" height="26" rx="5" fill="transparent"/>
  <text x="20" y="476" font-size="13" fill="#7a7a77">Marcos</text>
  
  <rect x="8" y="486" width="224" height="26" rx="5" fill="transparent"/>
  <text x="20" y="504" font-size="13" fill="#7a7a77">Lucas</text>
  
  <rect x="8" y="514" width="224" height="26" rx="5" fill="transparent"/>
  <text x="20" y="532" font-size="13" fill="#7a7a77">João</text>
  
  <!-- Ebooks button -->
  <rect x="8" y="670" width="224" height="34" rx="7" fill="#32333a" stroke="#3d3e45" stroke-width="1"/>
  <text x="28" y="692" font-size="11" font-weight="700" fill="#b5b6b9">📚  Ebooks</text>
  
  <!-- Main area top bar -->
  <rect x="240" y="0" width="960" height="52" fill="#26272b"/>
  <line x1="240" y1="52" x2="1200" y2="52" stroke="#32333a" stroke-width="1"/>
  
  <!-- Breadcrumb -->
  <text x="260" y="30" font-size="12" fill="#7a7a77">Gênesis</text>
  <text x="315" y="30" font-size="12" fill="#5a5a57">/</text>
  <text x="328" y="30" font-size="12" font-weight="600" fill="#e9e9e7">Capítulo 1</text>
  
  <!-- Nav arrows -->
  <rect x="1080" y="12" width="28" height="28" rx="6" fill="#32333a"/>
  <text x="1090" y="31" font-size="14" fill="#7a7a77">‹</text>
  <rect x="1114" y="12" width="28" height="28" rx="6" fill="#32333a"/>
  <text x="1124" y="31" font-size="14" fill="#7a7a77">›</text>
  
  <!-- Translation badge -->
  <rect x="960" y="14" width="90" height="24" rx="5" fill="#32333a"/>
  <text x="972" y="30" font-size="11" font-weight="600" fill="#b5b6b9">ARC  ▾</text>
  
  <!-- Main content area -->
  <rect x="240" y="52" width="760" height="698" fill="#1a1b1e"/>
  
  <!-- Chapter title -->
  <text x="320" y="110" font-size="28" font-weight="800" fill="#e9e9e7">Gênesis 1</text>
  <text x="320" y="135" font-size="13" fill="#7a7a77">A Criação do Mundo</text>
  <line x1="320" y1="150" x2="920" y2="150" stroke="#2e2e33" stroke-width="1"/>
  
  <!-- Verse 1 -->
  <text x="320" y="182" font-size="11" font-weight="800" fill="#e07b54">1</text>
  <text x="340" y="182" font-size="15" fill="#e9e9e7">No princípio criou Deus os céus e a terra.</text>
  
  <!-- Comment for verse 1 -->
  <rect x="340" y="194" width="560" height="68" rx="6" fill="#e07b54" fill-opacity="0.07"/>
  <rect x="340" y="194" width="3" height="68" rx="2" fill="#e07b54"/>
  <text x="354" y="213" font-size="10" font-weight="800" fill="#e07b54" letter-spacing="0.06em">COMENTÁRIO — MATTHEW HENRY</text>
  <text x="354" y="230" font-size="12" fill="#9a9a97">O primeiro verso da Bíblia estabelece Deus como o</text>
  <text x="354" y="246" font-size="12" fill="#9a9a97">criador soberano de tudo. "No princípio" não descreve</text>
  <text x="354" y="262" font-size="12" fill="#9a9a97">um tempo anterior a Deus, mas o início da criação...</text>
  
  <!-- Verse 2 -->
  <text x="320" y="290" font-size="11" font-weight="800" fill="#e07b54">2</text>
  <text x="340" y="290" font-size="15" fill="#e9e9e7">A terra era sem forma e vazia; e havia trevas</text>
  <text x="340" y="310" font-size="15" fill="#e9e9e7">sobre a face do abismo; e o Espírito de Deus</text>
  <text x="340" y="330" font-size="15" fill="#e9e9e7">pairava sobre a face das águas.</text>
  
  <!-- Verse 3 highlighted -->
  <rect x="312" y="344" width="576" height="36" rx="4" fill="#e07b54" fill-opacity="0.06"/>
  <text x="320" y="368" font-size="11" font-weight="800" fill="#e07b54">3</text>
  <text x="340" y="368" font-size="15" font-weight="600" fill="#e9e9e7">E disse Deus: Haja luz; e houve luz.</text>
  
  <!-- Comment for verse 3 -->
  <rect x="340" y="390" width="560" height="72" rx="6" fill="#e07b54" fill-opacity="0.07"/>
  <rect x="340" y="390" width="3" height="72" rx="2" fill="#e07b54"/>
  <text x="354" y="409" font-size="10" font-weight="800" fill="#e07b54" letter-spacing="0.06em">COMENTÁRIO — JOÃO CALVINO</text>
  <text x="354" y="426" font-size="12" fill="#9a9a97">A criação da luz pela palavra é um ato de poder</text>
  <text x="354" y="442" font-size="12" fill="#9a9a97">soberano. Calvino vê aqui o Logos (Jo 1:3) como o</text>
  <text x="354" y="458" font-size="12" fill="#9a9a97">agente da criação, revelando a Trindade no próprio...</text>
  
  <!-- Verse 4 -->
  <text x="320" y="490" font-size="11" font-weight="800" fill="#e07b54">4</text>
  <text x="340" y="490" font-size="15" fill="#e9e9e7">E viu Deus que a luz era boa; e fez Deus</text>
  <text x="340" y="510" font-size="15" fill="#e9e9e7">separação entre a luz e as trevas.</text>
  
  <!-- Verse 5 -->
  <text x="320" y="540" font-size="11" font-weight="800" fill="#e07b54">5</text>
  <text x="340" y="540" font-size="15" fill="#e9e9e7">E chamou Deus à luz Dia, e às trevas chamou</text>
  <text x="340" y="560" font-size="15" fill="#e9e9e7">Noite. E foi a tarde e a manhã, o dia primeiro.</text>
  
  <!-- Progress bar -->
  <rect x="260" y="720" width="680" height="3" rx="2" fill="#32333a"/>
  <rect x="260" y="720" width="68" height="3" rx="2" fill="#e07b54"/>
  <text x="956" y="724" font-size="11" fill="#7a7a77">10%</text>
  
  <!-- Right sidebar - context panel -->
  <rect x="1000" y="52" width="200" height="698" fill="#26272b"/>
  <line x1="1000" y1="52" x2="1000" y2="750" stroke="#32333a" stroke-width="1"/>
  
  <text x="1016" y="90" font-size="11" font-weight="700" fill="#7a7a77" letter-spacing="0.07em">CONTEXTO DO CAPÍTULO</text>
  <text x="1016" y="112" font-size="12" fill="#9a9a97">A narrativa da criação em</text>
  <text x="1016" y="128" font-size="12" fill="#9a9a97">Gênesis 1 apresenta Deus</text>
  <text x="1016" y="144" font-size="12" fill="#9a9a97">como criador soberano de</text>
  <text x="1016" y="160" font-size="12" fill="#9a9a97">toda a existência, por meio</text>
  <text x="1016" y="176" font-size="12" fill="#9a9a97">de sua palavra poderosa.</text>
  
  <line x1="1016" y1="194" x2="1184" y2="194" stroke="#32333a" stroke-width="1"/>
  
  <text x="1016" y="214" font-size="11" font-weight="700" fill="#7a7a77" letter-spacing="0.07em">REFERÊNCIAS CRUZADAS</text>
  <text x="1016" y="234" font-size="12" fill="#e07b54">João 1:1-3</text>
  <text x="1016" y="252" font-size="12" fill="#e07b54">Colossenses 1:16</text>
  <text x="1016" y="270" font-size="12" fill="#e07b54">Salmos 33:6</text>
  <text x="1016" y="288" font-size="12" fill="#e07b54">Hebreus 11:3</text>
  
  <line x1="1016" y1="306" x2="1184" y2="306" stroke="#32333a" stroke-width="1"/>
  
  <text x="1016" y="326" font-size="11" font-weight="700" fill="#7a7a77" letter-spacing="0.07em">AUTORES REFERENCIADOS</text>
  <rect x="1016" y="336" width="150" height="22" rx="4" fill="#32333a"/>
  <text x="1028" y="352" font-size="11" fill="#9a9a97">Matthew Henry</text>
  <rect x="1016" y="364" width="130" height="22" rx="4" fill="#32333a"/>
  <text x="1028" y="380" font-size="11" fill="#9a9a97">João Calvino</text>
  <rect x="1016" y="392" width="140" height="22" rx="4" fill="#32333a"/>
  <text x="1028" y="408" font-size="11" fill="#9a9a97">Agostinho</text>
</svg>