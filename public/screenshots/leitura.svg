      .content { fill: #1a1b1e; }
      .text-main { fill: #e9e9e7; }
      .text-muted { fill: #7a7a77; }
      .text-accent { fill: #e07b54; }
      .border { stroke: #32333a; stroke-width: 1; fill: none; }
      .verse-bg { fill: #26272b; }
      .comment-bg { fill: rgba(224,123,84,0.08); }
      .gold { fill: #e07b54; }
    </style>
    <clipPath id="sidebar-clip">
