<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif; }</style>
    <clipPath id="screen-clip">
      <rect x="0" y="0" width="390" height="844" rx="40"/>
    </clipPath>
  </defs>
  
  <!-- Background -->
  <rect width="390" height="844" fill="#1a1b1e" rx="40"/>
  
  <!-- Status bar -->
  <rect width="390" height="44" fill="#26272b"/>
  <text x="30" y="28" font-size="12" font-weight="600" fill="#e9e9e7">9:41</text>
  <text x="340" y="28" font-size="12" fill="#e9e9e7">●●●</text>
  
  <!-- Nav bar -->
  <rect y="44" width="390" height="50" fill="#26272b"/>
  <line x1="0" y1="94" x2="390" y2="94" stroke="#32333a" stroke-width="1"/>
  <rect x="12" y="56" width="30" height="26" rx="6" fill="#32333a"/>
  <text x="19" y="74" font-size="14" fill="#9a9a97">☰</text>
  <text x="56" y="74" font-size="15" font-weight="700" fill="#e9e9e7">Gênesis 1</text>
  <rect x="300" y="56" width="70" height="26" rx="6" fill="#32333a"/>
  <text x="315" y="74" font-size="11" font-weight="600" fill="#b5b6b9">ARC  ▾</text>
  
  <!-- Content area -->
  <!-- Chapter header -->
  <text x="20" y="135" font-size="22" font-weight="800" fill="#e9e9e7">Gênesis 1</text>
  <text x="20" y="156" font-size="13" fill="#7a7a77">A Criação do Mundo</text>
  <line x1="20" y1="168" x2="370" y2="168" stroke="#2e2e33" stroke-width="1"/>
  
  <!-- Verse 1 -->
  <text x="20" y="196" font-size="11" font-weight="800" fill="#e07b54">1</text>
  <text x="38" y="196" font-size="15" fill="#e9e9e7">No princípio criou Deus</text>
  <text x="38" y="216" font-size="15" fill="#e9e9e7">os céus e a terra.</text>
  
  <!-- Comment box -->
  <rect x="38" y="228" width="332" height="80" rx="8" fill="#e07b54" fill-opacity="0.08"/>
  <rect x="38" y="228" width="3" height="80" rx="2" fill="#e07b54"/>
  <text x="50" y="247" font-size="10" font-weight="800" fill="#e07b54" letter-spacing="0.06em">MATTHEW HENRY</text>
  <text x="50" y="264" font-size="12" fill="#9a9a97">O primeiro verso da Bíblia</text>
  <text x="50" y="280" font-size="12" fill="#9a9a97">estabelece Deus como criador</text>
  <text x="50" y="296" font-size="12" fill="#9a9a97">soberano de toda a existência.</text>
  
  <!-- Verse 2 -->
  <text x="20" y="334" font-size="11" font-weight="800" fill="#e07b54">2</text>
  <text x="38" y="334" font-size="15" fill="#e9e9e7">A terra era sem forma e</text>
  <text x="38" y="354" font-size="15" fill="#e9e9e7">vazia; e havia trevas sobre</text>
  <text x="38" y="374" font-size="15" fill="#e9e9e7">a face do abismo...</text>
  
  <!-- Verse 3 highlighted -->
  <rect x="14" y="390" width="362" height="38" rx="6" fill="#e07b54" fill-opacity="0.08"/>
  <text x="20" y="415" font-size="11" font-weight="800" fill="#e07b54">3</text>
  <text x="38" y="415" font-size="15" font-weight="600" fill="#e9e9e7">E disse Deus: Haja luz;</text>
  
  <!-- Calvino comment -->
  <rect x="38" y="438" width="332" height="76" rx="8" fill="#e07b54" fill-opacity="0.08"/>
  <rect x="38" y="438" width="3" height="76" rx="2" fill="#e07b54"/>
  <text x="50" y="456" font-size="10" font-weight="800" fill="#e07b54" letter-spacing="0.06em">JOÃO CALVINO</text>
  <text x="50" y="472" font-size="12" fill="#9a9a97">Aqui o Logos (Jo 1:3) é</text>
  <text x="50" y="488" font-size="12" fill="#9a9a97">revelado como agente da</text>
  <text x="50" y="504" font-size="12" fill="#9a9a97">criação, mostrando a Trindade.</text>
  
  <!-- Verse 4 -->
  <text x="20" y="540" font-size="11" font-weight="800" fill="#e07b54">4</text>
  <text x="38" y="540" font-size="15" fill="#e9e9e7">E viu Deus que a luz era</text>
  <text x="38" y="560" font-size="15" fill="#e9e9e7">boa; e fez separação entre</text>
  <text x="38" y="580" font-size="15" fill="#e9e9e7">a luz e as trevas.</text>
  
  <!-- Verse 5 -->
  <text x="20" y="616" font-size="11" font-weight="800" fill="#e07b54">5</text>
  <text x="38" y="616" font-size="15" fill="#e9e9e7">E chamou Deus à luz Dia,</text>
  <text x="38" y="636" font-size="15" fill="#e9e9e7">e às trevas chamou Noite.</text>
  
  <!-- Gradient fade -->
  <rect x="0" y="660" width="390" height="120" fill="url(#bottom-fade)"/>
  <defs>
    <linearGradient id="bottom-fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b1e;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#1a1b1e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Bottom nav bar -->
  <rect y="780" width="390" height="64" fill="#26272b"/>
  <line x1="0" y1="780" x2="390" y2="780" stroke="#32333a" stroke-width="1"/>
  
  <!-- Nav icons -->
  <text x="45" y="812" font-size="22" text-anchor="middle" fill="#e07b54">📖</text>
  <text x="45" y="828" font-size="10" text-anchor="middle" fill="#e07b54">Bíblia</text>
  
  <text x="130" y="812" font-size="22" text-anchor="middle" fill="#5a5a57">📚</text>
  <text x="130" y="828" font-size="10" text-anchor="middle" fill="#5a5a57">Ebooks</text>
  
  <text x="215" y="812" font-size="22" text-anchor="middle" fill="#5a5a57">📅</text>
  <text x="215" y="828" font-size="10" text-anchor="middle" fill="#5a5a57">Planos</text>
  
  <text x="300" y="812" font-size="22" text-anchor="middle" fill="#5a5a57">🔍</text>
  <text x="300" y="828" font-size="10" text-anchor="middle" fill="#5a5a57">Buscar</text>
  
  <text x="360" y="812" font-size="22" text-anchor="middle" fill="#5a5a57">⚙️</text>
  <text x="360" y="828" font-size="10" text-anchor="middle" fill="#5a5a57">Config</text>
  
  <!-- Home indicator -->
  <rect x="155" y="836" width="80" height="4" rx="2" fill="#e9e9e7" opacity="0.4"/>
</svg>